<!DOCTYPE html>
<html>
<head>
  <title>Sign Up - Branch of Israel</title>
</head>

<body>
  <p>Redirecting to sign up...</p>

  <script>
    const params = new URLSearchParams(window.location.search);

    const redirectBack =
      params.get("redirect") ||
      "https://bible.branchofisrael.com/";

    window.location.href =
      "https://stirred-pony-14.accounts.dev/sign-up?redirect_url=" +
      encodeURIComponent(redirectBack);
  </script>
</body>
</html>
