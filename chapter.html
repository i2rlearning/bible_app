<!DOCTYPE html>
<html>
  <head>
    <link href="css/menu.css" rel="stylesheet" />
    <link href="css/bible-main.css" rel="stylesheet" />
    <link rel="icon" type="image/x-icon" href="/img/favicon.ico">
    <title>Branch of Israel - Bible App</title>
  </head>

   <body class="index">
      <div class="subheader" id="stickyHeader">
        <div class="container flex">
          <div class="subheadings">
            <div class="column">
              <div class="hamburger">
                  <button
                  type="button"
                  id="menuToggle"
                  class="main-nav-toggle"
                  aria-label="Toggle menu"
                  aria-expanded="false"
                >
                  <span></span>
                  <span></span>
                  <span></span>
                </button>
              </div>
            </div>
            <div class="column">
              <span class="tooltip"> <span id="bible"></span>
                  <span class="tooltiptext  tooltip-bottom"><span id="biblefullname"></span></span>
              </span>
            </div>
            <div class="column">
              <span id="bookName" style=></span><span style="color:lightgray;">&nbsp; Chapter</span>
            </div>    
          </div>
        </div>
      </div>
                  
    <header>
      <div id="menuNav" class="overlay">
        <div class="overlay-content">
          <a href="./index.html">Home</a>
          <a id="bookurl">Books</a>
          <a href="#" class="current">Chapter</a>
          <a href="./search.html">Search</a>
          <!--<a href="#">Preferences</a>-->
        </div>
      </div>
    </header>

    <main class="container">
      <!--<h4 class="list-heading"><span>Select a Chapter</span></h4>-->
      <div id="chapter-list" class="list-container numeric-list"></div>
      <div class="leftcol">
          <a id="prevURL" >
            <img id="imgleft" class="left-button" src="./img/orig_left_stamp.png" />
          </a>
      </div>      
      
      <div class="rightcol">
          <a id="nextURL">
            <img id="imgright" class="right-button" src="./img/orig_right_stamp.png"  />
          </a>
      </div>
    </main>

    
    <script src="js/my_key.js"></script>
    <script src="js/menu.js" defer></script> 
    <script>
      const bibleChapterList =
        document.getElementById("chapter-list");
    
      const bibleVersionID =
        getParameterByName("bible") ||
        getParameterByName("version");
    
      const bibleBookID =
        getParameterByName("book");
    
      const abbreviation =
        getParameterByName("bibleAbbr") ||
        getParameterByName("abbr") ||
        "";
    
      const fullBibleName =
        getParameterByName("bibleName") ||
        localStorage.getItem("selectedBibleName") ||
        "";
    
      const bibleBookName =
        getParameterByName("bookName") ||
        getParameterByName("name") ||
        "";
    
      if (!bibleVersionID) {
        window.location.replace("./index.html");
      } else if (!bibleBookID) {
        const bookParams = new URLSearchParams();
    
        bookParams.set("bible", bibleVersionID);
    
        if (abbreviation) {
          bookParams.set("bibleAbbr", abbreviation);
        }
    
        if (fullBibleName) {
          bookParams.set("bibleName", fullBibleName);
        }
    
        window.location.replace(
          `./book.html?${bookParams.toString()}`
        );
      } else {
        initializeChapterPage();
      }
    
      async function initializeChapterPage() {
        updateHeader();
        updateMenuLinks();
    
        try {
          const chapterList = await getChapters(
            bibleVersionID,
            bibleBookID
          );
    
          renderChapters(chapterList);
        } catch (error) {
          console.error(
            "Unable to load chapters:",
            error
          );
    
          bibleChapterList.textContent =
            "Unable to load chapters.";
        }
      }
    
      function updateHeader() {
        const bibleElement =
          document.getElementById("bible");
    
        const bibleFullNameElement =
          document.getElementById("biblefullname");
    
        const bookNameElement =
          document.getElementById("bookName");
    
        if (bibleElement) {
          bibleElement.textContent =
            abbreviation || "Bible";
        }
    
        if (bibleFullNameElement) {
          bibleFullNameElement.textContent =
            fullBibleName ||
            abbreviation ||
            bibleVersionID;
        }
    
        if (bookNameElement) {
          bookNameElement.textContent =
            bibleBookName || bibleBookID;
        }
      }
    
      function updateMenuLinks() {
        const homeLink =
          document.querySelector(
            '.overlay-content a[href="./index.html"]'
          );
    
        const bookLink =
          document.getElementById("bookurl");
    
        const searchLink =
          document.querySelector(
            '.overlay-content a[href="./search.html"]'
          );
    
        const bibleParams =
          new URLSearchParams();
    
        bibleParams.set(
          "bible",
          bibleVersionID
        );
    
        if (abbreviation) {
          bibleParams.set(
            "bibleAbbr",
            abbreviation
          );
        }
    
        if (fullBibleName) {
          bibleParams.set(
            "bibleName",
            fullBibleName
          );
        }
    
        if (homeLink) {
          homeLink.href =
            `./index.html?${bibleParams.toString()}`;
        }
    
        if (bookLink) {
          bookLink.href =
            `./book.html?${bibleParams.toString()}`;
        }
    
        if (searchLink) {
          searchLink.href =
            `./search.html?${bibleParams.toString()}`;
        }
      }
    
      function renderChapters(chapterList) {
        bibleChapterList.innerHTML = "";
    
        const list =
          document.createElement("ol");
    
        for (const chapter of chapterList) {
          const listItem =
            document.createElement("li");
    
          listItem.className =
            "grid";
    
          const link =
            document.createElement("a");
    
          link.className =
            "grid-link";
    
          link.textContent =
            chapter.number;
    
          const verseParams =
            new URLSearchParams();
    
          verseParams.set(
            "bible",
            bibleVersionID
          );
    
          if (abbreviation) {
            verseParams.set(
              "bibleAbbr",
              abbreviation
            );
          }
    
          if (fullBibleName) {
            verseParams.set(
              "bibleName",
              fullBibleName
            );
          }
    
          verseParams.set(
            "book",
            bibleBookID
          );
    
          if (bibleBookName) {
            verseParams.set(
              "bookName",
              bibleBookName
            );
          }
    
          verseParams.set(
            "chapter",
            chapter.id
          );
    
          link.href =
            `./verse.html?${verseParams.toString()}`;
    
          listItem.appendChild(link);
          list.appendChild(listItem);
        }
    
        bibleChapterList.appendChild(list);
    
        if (chapterList.length > 0) {
          sessionStorage.setItem(
            "maxchapnum",
            String(
              chapterList[
                chapterList.length - 1
              ].number
            )
          );
        }
      }
    
      function getChapters(
        bibleId,
        bookId
      ) {
        return new Promise(
          (resolve, reject) => {
            const xhr =
              new XMLHttpRequest();
    
            xhr.withCredentials =
              false;
    
            xhr.addEventListener(
              "readystatechange",
              function () {
                if (
                  this.readyState !==
                  XMLHttpRequest.DONE
                ) {
                  return;
                }
    
                if (
                  this.status < 200 ||
                  this.status >= 300
                ) {
                  reject(
                    new Error(
                      `Chapter request failed with status ${this.status}.`
                    )
                  );
    
                  return;
                }
    
                try {
                  const response =
                    JSON.parse(
                      this.responseText
                    );
    
                  const chapters =
                    Array.isArray(
                      response.data
                    )
                      ? response.data.map(
                          ({
                            number,
                            id
                          }) => {
                            return {
                              number,
                              id
                            };
                          }
                        )
                      : [];
    
                  resolve(chapters);
                } catch (error) {
                  reject(error);
                }
              }
            );
    
            xhr.addEventListener(
              "error",
              () => {
                reject(
                  new Error(
                    "A network error occurred while loading chapters."
                  )
                );
              }
            );
    
            xhr.open(
              "GET",
              `https://api.scripture.api.bible/v1/bibles/${encodeURIComponent(
                bibleId
              )}/books/${encodeURIComponent(
                bookId
              )}/chapters`
            );
    
            xhr.setRequestHeader(
              "api-key",
              API_KEY
            );
    
            xhr.send();
          }
        );
      }
    
      function getParameterByName(
        name
      ) {
        return new URLSearchParams(
          window.location.search
        ).get(name);
      }
    
      window.onscroll =
        function () {
          handleStickyHeader();
        };
    
      const header =
        document.getElementById(
          "stickyHeader"
        );
    
      const sticky =
        header
          ? header.offsetTop
          : 0;
    
      function handleStickyHeader() {
        if (!header) {
          return;
        }
    
        if (
          window.pageYOffset >
          sticky
        ) {
          header.classList.add(
            "sticky"
          );
        } else {
          header.classList.remove(
            "sticky"
          );
        }
      }
    
      function openNav() {
        const menu =
          document.getElementById(
            "menuNav"
          );
    
        if (menu) {
          menu.style.width =
            "225px";
        }
      }
    
      function closeNav() {
        const menu =
          document.getElementById(
            "menuNav"
          );
    
        if (menu) {
          menu.style.width =
            "0px";
        }
      }
    </script>
  </body>
</html>
