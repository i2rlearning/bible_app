<!DOCTYPE html>
<html>
<head>
  <title>Sign In - Branch of Israel</title>
</head>

<body>
  <p>Redirecting to sign in...</p>

  <script>
    const params = new URLSearchParams(window.location.search);
  
    const redirectBack =
      params.get("redirect") ||
      "https://bible.branchofisrael.com/";
  
    window.location.href =
      "https://stirred-pony-14.accounts.dev/sign-in?redirect_url=" +
      encodeURIComponent(redirectBack);
  </script>
</body>
</html>
