<main class="container" style="font-size: 18px;">

    <script src="js/my_key.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/misc.js"></script>

    <script>
      document.addEventListener("DOMContentLoaded", () => {
      
        // 1. Element Selectors
        const elements = {
          menuNav: document.getElementById("menuNav"),
          fontSizeSlider: document.getElementById("font-size-slider"),
          displayText: document.getElementById("bible-version-list"),
          langInput: document.getElementById("langInput"),
          loginModal: document.getElementById("loginModal"),
          signupModal: document.getElementById("signupModal")
        };
      
        // 2. Side Navigation
        window.openNav = () => {
          if (elements.menuNav) {
            elements.menuNav.style.width = "225px";
          }
        };
      
        window.closeNav = () => {
          if (elements.menuNav) {
            elements.menuNav.style.width = "0px";
          }
        };
      
        // 3. Font Resize Logic
        elements.fontSizeSlider?.addEventListener("input", (e) => {
          if (elements.displayText) {
            elements.displayText.style.fontSize = `${e.target.value}px`;
          }
        });
      
        // 4. Language Selection
        if (elements.langInput) {
          const savedApiUrl = localStorage.getItem("selectedBibleApi");
      
          if (savedApiUrl) {
            elements.langInput.value = savedApiUrl;
          }
      
          elements.langInput.addEventListener("change", function () {
            const selectedUrl = this.value;
            const selectedName = this.options[this.selectedIndex].text.trim();
      
            localStorage.setItem("selectedBibleApi", selectedUrl);
            localStorage.setItem("selectedBibleName", selectedName);
      
            window.location.reload();
          });
        }
      
        // 5. Modal Management
        const toggleModal = (modal, show) => {
          if (!modal) return;
      
          if (show) {
            modal.style.display = "block";
            modal.classList.add("is-open");
          } else {
            modal.style.display = "none";
            modal.classList.remove("is-open");
          }
        };
      
        // 6. Global Click Listener
        document.addEventListener("click", (e) => {
          const target = e.target;
      
          if (target.id === "login") {
            toggleModal(elements.loginModal, true);
          }
      
          if (target.id === "signup") {
            toggleModal(elements.signupModal, true);
          }
      
          const isCloser = [
            "cancelLogin",
            "closelogin",
            "cancelSignupBtn",
            "closeSignup"
          ].includes(target.id);
      
          const isBackgroundClick =
            target === elements.loginModal || target === elements.signupModal;
      
          if (isCloser || isBackgroundClick) {
            toggleModal(elements.loginModal, false);
            toggleModal(elements.signupModal, false);
          }
        });
      
      });
      </script>
  </body>
</html>
