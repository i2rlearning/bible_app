    <script>
    document.addEventListener('DOMContentLoaded', () => {
        // --- Elements ---
        const elements = {
            menuNav: document.getElementById("menuNav"),
            fontSizeSlider: document.getElementById("font-size-slider"),
            displayText: document.getElementById("bible-version-list"),
            langInput: document.getElementById('langInput'),
            // Modals
            loginModal: document.getElementById('loginModal'),
            signupModal: document.getElementById('signupModal')
        };
    
        // --- Side Navigation ---
        window.openNav = () => elements.menuNav.style.width = "225px";
        window.closeNav = () => elements.menuNav.style.width = "0px";
    
        // --- Font Resizing ---
        elements.fontSizeSlider?.addEventListener("input", (e) => {
            if (elements.displayText) {
                elements.displayText.style.fontSize = `${e.target.value}px`;
            }
        });
    
        // --- Combobox Language Selection ---
        elements.langInput?.addEventListener('change', function() {
            const selectedValue = this.value;
            const options = document.querySelectorAll('#languages option');
            
            const match = Array.from(options).find(opt => opt.value === selectedValue);
            
            if (match) {
                const apiUrl = match.getAttribute('data-url');
                console.log("Navigating to:", apiUrl);
                
                // Logic: Save preference then reload
                // localStorage.setItem('selectedBibleApi', apiUrl);
                // window.location.reload();
            }
        });
    
        // --- Modal Logic (Login/Signup) ---
        const toggleModal = (modal, show) => {
            modal?.classList.toggle('is-open', show);
        };
    
        // Global click listener for buttons and "click outside"
        document.addEventListener('click', (e) => {
            const id = e.target.id;
    
            // Open Actions
            if (id === 'login')  toggleModal(elements.loginModal, true);
            if (id === 'signup') toggleModal(elements.signupModal, true);
    
            // Close Actions (Cancel buttons, Close icons, or clicking the background overlay)
            if (['cancelLogin', 'closelogin', 'cancelSignupBtn', 'closeSignup'].includes(id) || 
                e.target === elements.loginModal || 
                e.target === elements.signupModal) {
                toggleModal(elements.loginModal, false);
                toggleModal(elements.signupModal, false);
            }
        });
    });
  </script>
  </body>
</html>
