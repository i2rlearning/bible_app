            <div class="column">

    <!-- ****** Login ****** -->
    <div id="loginModal" class="modal">
      <form class="modal-content" action="/action_page.php">
        <button type="button" id="closelogin" class="modal-close" title="Close Login">
          &times;
        </button>
    
        <div class="modal-input-container">
          <label for="loginUsername"><b>Username</b></label>
          <input
            id="loginUsername"
            type="text"
            placeholder="Enter Username"
            name="uname"
            required
          >
    
          <label for="loginPassword"><b>Password</b></label>
    
          <div class="password-field">
            <input
              id="loginPassword"
              type="password"
              placeholder="Enter Password"
              name="psw"
              required
            >
    
            <button
              type="button"
              class="show-password-btn"
              data-password-target="loginPassword"
            >
              Show
            </button>
          </div>
    
          <div class="login-button-row">
            <button type="submit" class="login-submit-btn">Login</button>
            <button type="button" id="cancelLogin" class="cancelbtn">Cancel</button>
          </div>
        </div>
    
        <div class="auth-actions">
          <span>Forgot <a href="#">password?</a></span>
          <span>Create <a href="#" id="openSignupFromLogin">account</a></span>
        </div>
      </form>
    </div>

    <!-- ****** Signup Form ****** -->
    <div id="signupModal" class="signup-modal">
      <form class="signup-form-content" action="/action_page.php">
        <button type="button" id="closeSignup" class="modal-close" title="Close Signup">
          &times;
        </button>
    
        <div class="acct-container">
          <h1>Sign Up</h1>
          <p>Please fill in this form to create an account.</p>
          <hr>
    
          <label for="signupEmail"><b>Email</b></label>
          <input
            id="signupEmail"
            type="text"
            placeholder="Enter Email"
            name="email"
            required
          >
    
          <label for="signupPassword"><b>Password</b></label>
    
          <div class="password-field">
            <input
              id="signupPassword"
              type="password"
              placeholder="Enter Password"
              name="psw"
              required
            >
    
            <button
              type="button"
              class="show-password-btn"
              data-password-target="signupPassword"
            >
              Show
            </button>
          </div>
    
          <label for="signupPasswordRepeat"><b>Repeat Password</b></label>
    
          <div class="password-field">
            <input
              id="signupPasswordRepeat"
              type="password"
              placeholder="Repeat Password"
              name="psw-repeat"
              required
            >
    
            <button
              type="button"
              class="show-password-btn"
              data-password-target="signupPasswordRepeat"
            >
              Show
            </button>
          </div>
    
          <p>
            By creating an account you agree to our
            <a href="#" style="color:dodgerblue">Terms & Privacy</a>.
          </p>
    
          <div class="signup-button-row">
            <button type="button" id="cancelSignupBtn" class="cancelbtn">Cancel</button>
            <button type="submit" class="signupbtn">Sign Up</button>
          </div>
        </div>
      </form>
    </div>

<main class="container" style="font-size: 18px;">
    <div id="bible-version-list">

    <script src="js/my_key.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/misc.js"></script>

    <script>
      document.addEventListener("DOMContentLoaded", () => {
    
        // 1. Element Selectors
        const elements = {
          menuNav: document.getElementById("menuNav"),
          fontSizeSlider: document.getElementById("font-size-slider"),
          displayText: document.getElementById("bible-version-list"),
          langInput: document.getElementById("langInput"),
          loginModal: document.getElementById("loginModal"),
          signupModal: document.getElementById("signupModal")
        };
    
        // 2. Side Navigation
        window.openNav = () => {
          if (elements.menuNav) {
            elements.menuNav.style.width = "225px";
          }
        };
    
        window.closeNav = () => {
          if (elements.menuNav) {
            elements.menuNav.style.width = "0px";
          }
        };
    
        // 3. Font Resize Logic
        // elements.fontSizeSlider?.addEventListener("input", (e) => {
        //   if (elements.displayText) {
        //     elements.displayText.style.fontSize = `${e.target.value}px`;
        //   }
        // });
    
        // 4. Language Selection
        if (elements.langInput) {
          const savedApiUrl = localStorage.getItem("selectedBibleApi");
    
          if (savedApiUrl) {
            elements.langInput.value = savedApiUrl;
          }
    
          elements.langInput.addEventListener("change", function () {
            const selectedUrl = this.value;
            const selectedName = this.options[this.selectedIndex].text.trim();
    
            localStorage.setItem("selectedBibleApi", selectedUrl);
            localStorage.setItem("selectedBibleName", selectedName);
    
            window.location.reload();
          });
        }
    
        // 5. Modal Management
        const toggleModal = (modal, show) => {
          if (!modal) return;
        
          if (show) {
            modal.style.display = "flex";
            modal.classList.add("is-open");
          } else {
            modal.style.display = "none";
            modal.classList.remove("is-open");
          }
        };
    
        // 6. Global Click Listener
        document.addEventListener("click", (e) => {
          const target = e.target;
    
          if (!target) return;
    
          if (target.id === "login") {
            toggleModal(elements.loginModal, true);
          }
    
          if (target.id === "signup") {
            toggleModal(elements.signupModal, true);
          }
    
          if (target.id === "openSignupFromLogin") {
            e.preventDefault();
            toggleModal(elements.loginModal, false);
            toggleModal(elements.signupModal, true);
          }
    
          if (target.classList && target.classList.contains("show-password-btn")) {
            const passwordInputId = target.dataset.passwordTarget;
            const passwordInput = document.getElementById(passwordInputId);
    
            if (passwordInput) {
              const isPasswordHidden = passwordInput.type === "password";
    
              passwordInput.type = isPasswordHidden ? "text" : "password";
              target.textContent = isPasswordHidden ? "Hide" : "Show";
            }
          }
    
          const isCloser = [
            "cancelLogin",
            "closelogin",
            "cancelSignupBtn",
            "closeSignup"
          ].includes(target.id);
    
          const isBackgroundClick =
            target === elements.loginModal || target === elements.signupModal;
    
          if (isCloser || isBackgroundClick) {
            toggleModal(elements.loginModal, false);
            toggleModal(elements.signupModal, false);
          }
        });
    
      });
    </script>
  </body>
</html>
