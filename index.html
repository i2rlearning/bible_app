<!DOCTYPE html>
<html>
  <head>
    <link href="css/menu.css" rel="stylesheet" />
    <link href="css/bible-main.css" rel="stylesheet" />
    <link href="css/editor.css" rel="stylesheet" /> <!-- for my notes only -->
    
    <link rel="icon" type="image/x-icon" href="/img/favicon.ico">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css"/>
    <title>Branch of Israel - Bible App</title>
  </head>

  <!-- *********************** Header Sticky Menu ***********************  -->
  <body class="index">
      <div class="subheader" id="stickyHeader">
        <div class="container flex">
          <div class="subheadings">
      
            <div class="column">
              <div class="hamburger">
                  <button
                  type="button"
                  id="menuToggle"
                  class="main-nav-toggle"
                  aria-label="Toggle menu"
                  aria-expanded="false"
                >
                  <span></span>
                  <span></span>
                  <span></span>
                </button>
              </div>
            </div>
      
            <div class="column">
              <span style="color:lightgray;">Bible</span>
            </div>
      
            <div class="column">
              <span style="color:lightgray;">Book & Chapter</span>
            </div>
      
            <div class="column">
              <div class="custom-combobox language-row">
                <label for="langInput" class="language-label">Version:</label>
                <select id="langInput">
                  <option value="https://api.scripture.api.bible/v1/bibles?include-full-details=false" selected>
                    All
                  </option>
                  <!--<option value="https://api.scripture.api.bible/v1/bibles?language=eng&include-full-details=false">
                  <option value="https://rest.api.bible/v1/bibles?language=eng&include-full-details=false">-->                                 
                    English
                  </option>
                  <option value="https://api.scripture.api.bible/v1/bibles?language=grc&include-full-details=false">
                    Greek
                  </option>
                  <option value="https://api.scripture.api.bible/v1/bibles?ids=a8a97eebae3c98e4-01%2C%202c500771ea16da93-01%2C%200b262f1ed7f084a6-01&include-full-details=false">
                    Hebrew
                  </option>
                </select>
              </div>
            </div>
      
            <div class="column">
              <button type="button" id="login">Login</button>
              <button type="button" id="logout" style="display:none;">Logout</button>
            </div>
      
          </div>
        </div>
      </div>

    <!-- ****** My Notes Modal ****** -->
    <div id="myNotesModal" class="modal" style="display:none;">
      <div class="my-notes-content">
        <button type="button" id="closeMyNotes" class="modal-close" title="Close My Notes">
          &times;
        </button>
    
        <h2>My Notes</h2>
    
        <input
          type="text"
          id="myNotesSearch"
          placeholder="Search notes..."
          class="my-notes-search"
        >
    
        <div id="myNotesStatus" class="my-notes-status">
          Loading...
        </div>
    
        <div class="my-notes-table-wrapper">
          <table class="my-notes-table">
            <thead>
              <tr>
                <th>Bible</th>
                <th>Book / Chapter</th>
                <th>Saved Content</th>
                <th>Preview</th>
                <th>Updated</th>
                <th>Open</th>
                <th>Delete</th>
              </tr>
            </thead>
            <tbody id="myNotesTableBody">
            </tbody>
          </table>
        </div>
      </div>
    </div>
    
    <header>
      <div id="menuNav" class="overlay">        
        <div class="overlay-content">
          <a href="#" class="current">Home</a>
          <a href="#" class="disabled">Books</a>
          <a href="#" class="disabled">Chapter</a>
          <a href="./search.html">Search</a>
          <a href="#" id="openMyNotes" class="disabled" aria-disabled="true">My Notes</a>
          <!--<a href="#">Preferences</a>-->   
        </div>
      </div>
    </header>   

<main class="container" style="font-size: 18px;">
    <div id="bible-version-list">
        </div>
    
    <div class="leftcol">
        <a id="prevURL">
            <img id="imgleft" class="left-button" src="./img/orig_left_stamp.png" />
        </a>
    </div>

    <div class="rightcol">
        <a id="nextURL">
            <img id="imgright" class="right-button" src="./img/orig_right_stamp.png" />
        </a>
    </div>

    <div class="bottom-spacer"></div>
</main>    
    
    <script src="js/my_key.js"></script>
    <script src="js/menu.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/misc.js"></script>

    <script>
      document.addEventListener("DOMContentLoaded", () => {
    
        // 1. Element Selectors
        const elements = {
          menuNav: document.getElementById("menuNav"),
          fontSizeSlider: document.getElementById("font-size-slider"),
          displayText: document.getElementById("bible-version-list"),
          langInput: document.getElementById("langInput")
        };
        
        // 3. Font Resize Logic
        // elements.fontSizeSlider?.addEventListener("input", (e) => {
        //   if (elements.displayText) {
        //     elements.displayText.style.fontSize = `${e.target.value}px`;
        //   }
        // });
    
        // 4. Language Selection
        if (elements.langInput) {
          const savedApiUrl = localStorage.getItem("selectedBibleApi");
    
          if (savedApiUrl) {
            elements.langInput.value = savedApiUrl;
          }
    
          elements.langInput.addEventListener("change", function () {
            const selectedUrl = this.value;
            const selectedName = this.options[this.selectedIndex].text.trim();
    
            localStorage.setItem("selectedBibleApi", selectedUrl);
            localStorage.setItem("selectedBibleName", selectedName);
    
            window.location.reload();
          });
        }
    
      });
    </script>
  </body>
</html>
