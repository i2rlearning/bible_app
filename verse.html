<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="css/menu.css" rel="stylesheet" />
    <link href="css/bible-main.css" rel="stylesheet" />
    <link href="css/bible-selector.css" rel="stylesheet" />
    <link href="css/scripture.css" rel="stylesheet" />
    <link href="css/editor.css" rel="stylesheet" />
    <link rel="icon" type="image/x-icon" href="/img/favicon.ico">
    
    <link rel="preload" as="image" href="./img/left_stamp_on.png">
    <link rel="preload" as="image" href="./img/right_stamp_on.png">
    <link rel="preload" as="image" href="./img/orig_left_stamp.png">
    <link rel="preload" as="image" href="./img/orig_right_stamp.png">

    <link href="https://cdn.jsdelivr.net/npm/quill@2.0.2/dist/quill.snow.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@enzedonline/quill-blot-formatter2@3.2.0/dist/css/quill-blot-formatter2.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css"/>

    <title>Branch of Israel - Bible App</title>
  </head>
 
  <body class="index" >
      <div class="subheader" id="stickyHeader">
        <div class="container flex">
          <div class="subheadings">
            <!-- Mamburger menu -->
            <div class="column">
              <div class="hamburger">
                  <button
                    type="button"
                    id="menuToggle"
                    class="main-nav-toggle"
                    aria-label="Toggle menu"
                    aria-expanded="false"
                  >
                    <span></span>
                    <span></span>
                    <span></span>
                  </button>
                </div>
            </div>
            <!-- Compact passage picker -->
            <div class="column passage-picker-column">
              <div class="passage-picker" id="passage-picker">
                <button
                  type="button"
                  id="passage-picker-toggle"
                  class="passage-picker-toggle"
                  aria-haspopup="dialog"
                  aria-expanded="false"
                  aria-controls="passage-picker-panel"
                >
                  <span id="current-passage-label">Loading passage...</span>
                  <span class="passage-picker-chevron" aria-hidden="true">▼</span>
                </button>

                <div
                  id="passage-picker-panel"
                  class="passage-picker-panel"
                  role="dialog"
                  aria-modal="false"
                  aria-labelledby="passage-picker-title"
                  hidden
                >
                  <div class="passage-picker-header">
                    <h2 id="passage-picker-title">Open a Passage</h2>
                    <button
                      type="button"
                      id="passage-picker-close"
                      class="passage-picker-close"
                      aria-label="Close passage picker"
                    >
                      &times;
                    </button>
                  </div>

                  <div class="passage-picker-fields">
                    <label class="passage-picker-field" for="language-select">
                      <span>Language</span>
                      <select id="language-select"></select>
                    </label>

                    <label class="passage-picker-field" for="bible-select">
                      <span>Bible</span>
                      <select id="bible-select">
                        <option value="">Loading Bibles...</option>
                      </select>
                    </label>

                    <label class="passage-picker-field" for="book-select">
                      <span>Book</span>
                      <select id="book-select" disabled>
                        <option value="">Loading Books...</option>
                      </select>
                    </label>

                    <label class="passage-picker-field" for="chapter-select">
                      <span>Chapter</span>
                      <select id="chapter-select" disabled>
                        <option value="">Loading Chapters...</option>
                      </select>
                    </label>
                  </div>

                  <div class="passage-picker-actions">
                    <button
                      type="button"
                      id="passage-picker-open"
                      class="passage-picker-open"
                      disabled
                    >
                      Open Passage
                    </button>
                  </div>
                </div>
              </div>
            </div>
            <!-- Zoom for container -->
            <div class="column">
              <div class="align-group">
                <label for="font-size-slider">Zoom: </label>&nbsp;
                <input type="range" id="font-size-slider" min="18" max="35" value="18">
              </div>
            </div>    
            <!-- Login/Logout -->
            <div class="column auth-button-container verse-auth-buttons">
              <button
                type="button"
                id="login"
                class="auth-button"
              >
                <i
                  class="fa fa-user-o"
                  aria-hidden="true"
                ></i>
                <span>Login</span>
              </button>
            
              <button
                type="button"
                id="logout"
                class="auth-button"
                style="display: none;"
              >
                <i
                  class="fa fa-sign-out"
                  aria-hidden="true"
                ></i>
                <span>Logout</span>
              </button>
            </div>
        </div>
        </div>
      </div>


    <!-- **************** Preferences Modal **************** -->
    <div id="preferencesModal" class="preferences-modal" style="display: none;">
      <div class="preferences-dialog" role="dialog" aria-modal="true" aria-labelledby="preferences-title">
        <button type="button" id="closePreferences" class="preferences-close" aria-label="Close preferences">&times;</button>

        <h2 id="preferences-title">Preferences</h2>
        <!--<p class="preferences-intro">Choose your default language, Bible, and starting page.</p>-->

        <label class="preferences-field" for="preferences-language">
          <span>Preferred Language</span>
          <select id="preferences-language"></select>
        </label>

        <label class="preferences-field" for="preferences-bible">
          <span>Preferred Bible</span>
          <select id="preferences-bible" disabled>
            <option value="">Loading Bibles...</option>
          </select>
        </label>

        <label class="preferences-field" for="preferences-landing-page">
          <span>Starting Page</span>
          <select id="preferences-landing-page">
            <option value="index">Home</option>
            <option value="verse">Passage Page</option>
          </select>
        </label>

        <div id="preferences-status" class="preferences-status" aria-live="polite"></div>

        <div class="preferences-actions">
          <button type="button" id="cancelPreferences" class="preferences-button preferences-button-secondary">Cancel</button>
          <button type="button" id="savePreferences" class="preferences-button preferences-button-primary">Save Preferences</button>
        </div>
      </div>
    </div>

    <!-- ****** My Notes Modal ****** -->
    <div id="myNotesModal" class="modal" style="display:none;">
      <div class="my-notes-content">
        <button type="button" id="closeMyNotes" class="modal-close" title="Close My Notes">
          &times;
        </button>
    
        <h2>My Notes</h2>
    
        <input
          type="text"
          id="myNotesSearch"
          placeholder="Search notes..."
          class="my-notes-search"
        >
    
        <div id="myNotesStatus" class="my-notes-status">
          Loading...
        </div>
    
        <div class="my-notes-table-wrapper">
          <table class="my-notes-table">
            <thead>
              <tr>
                <th>Bible</th>
                <th>Book / Chapter</th>
                <th>Saved Content</th>
                <th>Preview</th>
                <th>Updated</th>
                <th>Open</th>
                <th>Delete</th>
              </tr>
            </thead>
            <tbody id="myNotesTableBody">
            </tbody>
          </table>
        </div>
      </div>
    </div>
      
    <header>
      <div id="menuNav" class="overlay">
        <div class="overlay-content">
          <a href="./index.html?stay=home">Home</a>
          <a id="bookurl" href="#">Books</a>
          <a id="chapterurl" href="#">Chapter</a>
          <a href="./search.html">Search</a>
          <a href="#" id="openMyNotes" class="disabled" aria-disabled="true">My Notes</a>
          <a href="#" id="openPreferences">Preferences</a>
        </div>
      </div>
    </header>

    <main class="container">
      <div id="bible-mini-toolbar">
        
        <div class="toolbar-dropdown">
          <button type="button" class="dropdown-btn" onclick="toggleFontMenu()">
            Font
          </button>  
       
          <div id="font-menu" class="toolbar-dropdown-menu">
            <button onclick="applyBibleFormat('bold'); closeFontMenu();" title="Bold"><strong>B</strong></button>
            <button onclick="applyBibleFormat('italic'); closeFontMenu();" title="Italic"><em>I</em></button>      
            <button onclick="applyBibleFormat('underline'); closeFontMenu();" title="Underline"><u>U</u></button>
            <button onclick="applyBibleFormat('double-underline'); closeFontMenu();" title="Double Underline"><span style="text-decoration-line: underline; text-decoration-style: double;">DU</span></button>
            <button onclick="applyBibleFormat('overline-underline'); closeFontMenu();" title="Overline Underline"><span style="text-decoration: overline underline;">OU</span></button>
            <button onclick="applyBibleFormat('strike-through'); closeFontMenu();" title="Strikethrough"><span style="text-decoration-line: line-through;">S</span></button>  
            <button onclick="applyBibleFormat('uppercase'); closeFontMenu();" title="Uppercase"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="menu-icon">
                  <path d="M4 18 L7.5 8 L11 18" />
                  <path d="M5.5 14 L9.5 14" />
                  <path d="M7.5 5 L7.5 2" stroke-width="1.8" />
                  <path d="M5.5 4 L7.5 2 L9.5 4" stroke-width="1.8" />
                  <path d="M13 18 L17.5 4 L22 18" />
                  <path d="M14.5 13 L20.5 13" />
                </svg>
            </button>  
         </div>
       </div>
    
       <div class="toolbar-dropdown">
         <button type="button" class="dropdown-btn" onclick="toggleFontColorMenu()">
           Font Color
         </button>
       
         <div id="font-color-menu" class="toolbar-dropdown-menu">
           <button type="button" class="font-color-option text-grey" onclick="applyBibleFormat('text-grey'); closeFontColorMenu();" title="Grey">A</button>
           <button type="button" class="font-color-option text-red" onclick="applyBibleFormat('text-red'); closeFontColorMenu();" title="Red">A</button>
           <button type="button" class="font-color-option text-blue" onclick="applyBibleFormat('text-blue'); closeFontColorMenu();" title="Blue">A</button>
           <button type="button" class="font-color-option text-green" onclick="applyBibleFormat('text-green'); closeFontColorMenu();" title="Green">A</button>
           <button type="button" class="font-color-option text-purple" onclick="applyBibleFormat('text-purple'); closeFontColorMenu();" title="Purple">A</button>
         </div>
       </div>         
              
       <div class="toolbar-dropdown">
         <button type="button" class="dropdown-btn" onclick="toggleHighlightMenu()">
           Highlighter 
         </button>
       
         <div id="highlight-menu" class="toolbar-dropdown-menu">
           <button type="button" class="color-option yellow" onclick="applyBibleFormat('highlight-yellow'); closeHighlightMenu();"></button>
           <button type="button" class="color-option green" onclick="applyBibleFormat('highlight-green'); closeHighlightMenu();"></button>
           <button type="button" class="color-option blue" onclick="applyBibleFormat('highlight-blue'); closeHighlightMenu();"></button>
           <button type="button" class="color-option pink" onclick="applyBibleFormat('highlight-pink'); closeHighlightMenu();"></button>
           <button type="button" class="color-option orange" onclick="applyBibleFormat('highlight-orange'); closeHighlightMenu();"></button>
         </div>
       </div>
    
     <span class="toolbar-separator">|</span> 
      <div class="toolbar-dropdown">
       <button type="button" class="dropdown-btn" onclick="toggleDrawMenu()">
           Draw
       </button>
     
       <div id="draw-menu" class="toolbar-dropdown-menu">
          <button type="button" onclick="setDrawingTool('circle'); closeDrawMenu();" data-drawing-tool="circle" title="Draw Circle" style="display: inline-flex; align-items: center; justify-content: center; padding: 4px;">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/></svg>
          </button>
        
          <button type="button" onclick="setDrawingTool('square'); closeDrawMenu();" data-drawing-tool="square" title="Draw Square" style="display: inline-flex; align-items: center; justify-content: center; padding: 4px;">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/></svg>
          </button>
        
          <button type="button" onclick="setDrawingTool('freehand'); closeDrawMenu();" data-drawing-tool="freehand" title="Freehand Draw" style="display: inline-flex; align-items: center; justify-content: center; padding: 4px;">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4Z"/></svg>
          </button>
        </div>
     </div>    
          
      <span class="toolbar-separator">|</span>
      <button onclick="setDrawingTool(null)" id="textToolButton" class="text-tool-button" data-drawing-tool="text" title="Text / Select">T</button>
      <button onclick="clearBibleSelectionFormat(); clearSelectedDrawnAnnotation();" title="Clear Format">Clear</button>
    </div>
    
      <div class="eb-container" id="display-text">
        <div id="bible-drawing-area">
            <div id="bible-text"></div>
            <svg id="bible-annotation-layer"></svg>
        </div>
      </div>
    
      <div class="leftcol">
        <a id="prevURL">
          <img id="imgleft" class="left-button" src="./img/orig_left_stamp.png" alt="Previous chapter" />
        </a>
      </div>
    
      <div class="rightcol">
        <a id="nextURL">
          <img id="imgright" class="right-button" src="./img/orig_right_stamp.png" alt="Next chapter" />
        </a>
      </div>

      <!-- Quill Editor --> 
      <div id="editor"></div>
      <div class="bottom-spacer"></div>

    </main>   

    <script src="js/my_key.js"></script>
    <script src="js/menu.js"></script>
    <script src="js/auth.js"></script>
    
    <script src="https://cdn.scripture.api.bible/fums/fumsv2.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/quill@2.0.2/dist/quill.js"></script><!-- Quill library -->

    <script src="js/bible-language.js"></script>
    <script src="js/bible-selector.js"></script>
    <script src="js/user-preferences.js"></script>
    <script src="js/verses.js" defer></script>
    <script type="module" src="js/editor.js"></script> 
   
</body>
</html>
