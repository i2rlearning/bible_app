    <script>   
      const searchInput = document.querySelector(`#search-input`);
      const bibleSectionList = document.querySelector(`#section-list`);
      const chapterText = document.querySelector(`#chapter-text`);
      const bibleVersionID = getParameterByName(`version`);
      const bibleChapterID = getParameterByName(`chapter`);
      const bibleName = getParameterByName(`name`);
      const abbreviation = getParameterByName(`abbr`);
      const maxChapters = sessionStorage.getItem("maxchapnum");
    
      let verseHTML = ``;

      const preloadedArrowImages = [
          "./img/left_stamp_on.png",
          "./img/right_stamp_on.png",
          "./img/orig_left_stamp.png",
          "./img/orig_right_stamp.png"
        ];
        
        preloadedArrowImages.forEach((src) => {
          const image = new Image();
          image.src = src;
        });  
        
      if (!bibleVersionID || !bibleChapterID) {
        window.location.href = `./index.html`;
      }
    
      const [book, chapter] = bibleChapterID.split(`.`);
      const bibleHTML = `${abbreviation}`;
      const bookChapHTML = `${bibleName} ${chapter}`;
      const chapterHTML = `${chapter}`;
    
      const bibleTitle = document.getElementById("bible");
      const bookChapTitle = document.getElementById("bookChap");
    
      if (bibleTitle) {
        bibleTitle.innerHTML = bibleHTML;
      }
    
      if (bookChapTitle) {
        bookChapTitle.innerHTML = bookChapHTML;
      }
    
      // Gets full book name for tooltip
      const fbookname = sessionStorage.getItem("fullbookname");
      const bibleFullName = document.getElementById("biblefullname");
    
      if (bibleFullName) {
        bibleFullName.innerHTML = fbookname;
      }
    
      // ******************* Bible zoom state *********************
      const fontSizeSlider = document.getElementById("font-size-slider");
    
      let currentBibleZoom = 1;
    
      fontSizeSlider.min = 18;
      fontSizeSlider.max = 35;
      fontSizeSlider.value = 18;
    
      function updateBibleZoomLayout() {
        const displayText = document.getElementById("display-text");
        const drawingArea = document.getElementById("bible-drawing-area");
    
        if (!displayText || !drawingArea) return;
    
        drawingArea.style.transform = `scale(${currentBibleZoom})`;
        drawingArea.style.transformOrigin = "top left";
    
        const displayStyles = window.getComputedStyle(displayText);
    
        const paddingTop = parseFloat(displayStyles.paddingTop) || 0;
        const paddingBottom = parseFloat(displayStyles.paddingBottom) || 0;
    
        const originalHeight = drawingArea.scrollHeight;
        const originalWidth = drawingArea.scrollWidth;
    
        const zoomedHeight = originalHeight * currentBibleZoom;
        const zoomedWidth = originalWidth * currentBibleZoom;
    
        const totalHeight = zoomedHeight + paddingTop + paddingBottom + 10;
    
        displayText.style.height = `${totalHeight}px`;
        displayText.style.minHeight = `${totalHeight}px`;
    
        drawingArea.style.width = `${originalWidth}px`;
    
        displayText.style.overflowX =
          zoomedWidth > displayText.clientWidth ? "auto" : "hidden";
    
        displayText.style.overflowY = "hidden";
      }
    
      fontSizeSlider.addEventListener("input", () => {
        const sliderValue = Number(fontSizeSlider.value);
    
        // 18 = 100%, 35 = about 194%
        currentBibleZoom = sliderValue / 18;
    
        updateBibleZoomLayout();
      });
    
      // ******************* Load chapter text *********************
      getChapterText(bibleChapterID)
          .then((content) => {
            document.getElementById("bible-text").innerHTML = content;
            resizeAnnotationLayer();
            updateBibleZoomLayout();
          })
          .catch((error) => {
            console.error("Failed to load chapter text:", error);
            document.getElementById("bible-text").innerHTML =
              "<p>Could not load chapter text. Please try again later.</p>";
          });
    
      /**
       * Gets verses from API.Bible
       */
      function getVerses(bibleVersionID, bibleChapterID) {
        return new Promise((resolve, reject) => {
          const xhr = new XMLHttpRequest();
          xhr.withCredentials = false;
    
          xhr.addEventListener(`readystatechange`, function () {
            if (this.readyState === this.DONE) {
              const { data } = JSON.parse(this.responseText);
              const verses = data.map(({ id }) => {
                return { id };
              });
    
              resolve(verses);
            }
          });
    
          xhr.open(
            `GET`,
            `https://api.scripture.api.bible/v1/bibles/${bibleVersionID}/chapters/${bibleChapterID}/verses`
          );
          xhr.setRequestHeader(`api-key`, API_KEY);
    
          xhr.onerror = () => reject(xhr.statusText);
    
          xhr.send();
        });
      }
    
      /**
       * Gets chapter text from API.Bible
       */
      function getChapterText(bibleChapterID) {
          return new Promise((resolve, reject) => {
            const xhr = new XMLHttpRequest();
            xhr.withCredentials = false;
        
            xhr.addEventListener("readystatechange", function () {
              if (this.readyState === this.DONE) {
                try {
                  if (this.status < 200 || this.status >= 300) {
                    console.error("API.Bible chapter request failed:", this.status, this.responseText);
                    reject(new Error(`API.Bible request failed with status ${this.status}`));
                    return;
                  }
        
                  const { data, meta } = JSON.parse(this.responseText);
        
                  if (meta && meta.fumsId && window._BAPI && typeof window._BAPI.t === "function") {
                    try {
                      window._BAPI.t(meta.fumsId);
                    } catch (error) {
                      console.warn("FUMS tracking failed:", error);
                    }
                  }
        
                  resolve(data.content);
                } catch (error) {
                  console.error("Could not parse/load chapter text:", error);
                  reject(error);
                }
              }
            });
        
            xhr.open(
              "GET",
              `https://api.scripture.api.bible/v1/bibles/${bibleVersionID}/chapters/${bibleChapterID}`
            );
        
            xhr.setRequestHeader("api-key", API_KEY);
        
            xhr.onerror = () => reject(new Error(xhr.statusText || "Network error"));
        
            xhr.send();
          });
        }
    
      function getSections(bibleVersionID, bibleBookID) {
        return new Promise((resolve, reject) => {
          const xhr = new XMLHttpRequest();
          xhr.withCredentials = false;
    
          xhr.addEventListener(`readystatechange`, function () {
            if (this.readyState === this.DONE) {
              const { data } = JSON.parse(this.responseText);
              const sections = data
                ? data.map(({ title, id }) => {
                    return { title, id };
                  })
                : null;
    
              resolve(sections);
            }
          });
    
          xhr.open(
            `GET`,
            `https://api.scripture.api.bible/v1/bibles/${bibleVersionID}/books/${bibleBookID}/sections`
          );
          xhr.setRequestHeader(`api-key`, API_KEY);
    
          xhr.onerror = () => reject(xhr.statusText);
    
          xhr.send();
        });
      }
    
      /**
       * Parses verse number from verseID
       */
      function getVerseNumber(verseID) {
        let verseNumber;
    
        if (verseID.includes(`-`)) {
          verseNumber =
            verseID.split(`-`).shift().split(`.`).pop() +
            `-` +
            verseID.split(`-`).pop().split(`.`).pop();
        } else {
          verseNumber = verseID.split(`.`).pop();
        }
    
        return verseNumber;
      }
    
      function getParameterByName(name) {
        const url = window.location.href;
        name = name.replace(/[\[\]]/g, `\\$&`);
    
        const regex = new RegExp(`[?&]` + name + `(=([^&#]*)|&|#|$)`);
        const results = regex.exec(url);
    
        if (!results) return null;
        if (!results[2]) return ``;
    
        return decodeURIComponent(results[2].replace(/\+/g, ` `));
      }    
         
      // ******************* Left/Right Seals *********************
      const imageLeft = document.getElementById("imgleft");
      const imageRight = document.getElementById("imgright");
    
      const chapterParts = bibleChapterID.split(".");
      const currentBookId = chapterParts[0];
      const currentChapterNumber = Number(chapterParts[1]);
    
      const maxChapterStorageKey = `maxchapnum:${bibleVersionID}:${currentBookId}`;
    
      let maxChapterNumber = Number(sessionStorage.getItem(maxChapterStorageKey)) || null;
    
      function buildChapterUrl(newChapterNumber) {
        const url = new URL(window.location.href);
    
        url.searchParams.set("chapter", `${currentBookId}.${newChapterNumber}`);
    
        return url.pathname + url.search;
      }
    
      function canGoPreviousChapter() {
        return Number.isFinite(currentChapterNumber) && currentChapterNumber > 1;
      }
    
      function canGoNextChapter() {
        return (
          Number.isFinite(currentChapterNumber) &&
          Number.isFinite(maxChapterNumber) &&
          currentChapterNumber < maxChapterNumber
        );
      }
    
      function updateArrowCursorStates() {
        if (imageLeft) {
          imageLeft.style.cursor = canGoPreviousChapter() ? "pointer" : "default";
        }
    
        if (imageRight) {
          imageRight.style.cursor = canGoNextChapter() ? "pointer" : "default";
        }
    
        console.log("Arrow state:", {
          bibleVersionID,
          currentBookId,
          currentChapterNumber,
          maxChapterNumber,
          canGoPrevious: canGoPreviousChapter(),
          canGoNext: canGoNextChapter()
        });
      }
    
      function loadMaxChapterNumberFromApi() {
        return new Promise((resolve, reject) => {
          const xhr = new XMLHttpRequest();
          xhr.withCredentials = false;
    
          xhr.addEventListener("readystatechange", function () {
            if (this.readyState === this.DONE) {
              try {
                const { data } = JSON.parse(this.responseText);
    
                const numericChapterNumbers = data
                  .map((chapter) => {
                    const chapterIdParts = chapter.id.split(".");
                    return Number(chapterIdParts[chapterIdParts.length - 1]);
                  })
                  .filter((chapterNumber) => Number.isFinite(chapterNumber));
    
                const detectedMaxChapter = numericChapterNumbers.length
                  ? Math.max(...numericChapterNumbers)
                  : null;
    
                resolve(detectedMaxChapter);
              } catch (error) {
                reject(error);
              }
            }
          });
    
          xhr.open(
            "GET",
            `https://api.scripture.api.bible/v1/bibles/${bibleVersionID}/books/${currentBookId}/chapters`
          );
    
          xhr.setRequestHeader("api-key", API_KEY);
          xhr.onerror = () => reject(xhr.statusText);
          xhr.send();
        });
      }
    
      async function initializeChapterArrows() {
        try {
          const detectedMaxChapter = await loadMaxChapterNumberFromApi();
    
          if (detectedMaxChapter) {
            maxChapterNumber = detectedMaxChapter;
            sessionStorage.setItem(maxChapterStorageKey, String(maxChapterNumber));
          }
        } catch (error) {
          console.error("Could not load max chapter number:", error);
        }
    
        updateArrowCursorStates();
      }
    
      if (imageLeft) {
        imageLeft.addEventListener("mouseover", function () {
          if (canGoPreviousChapter()) {
            imageLeft.src = "./img/left_stamp_on.png";
            imageLeft.style.cursor = "pointer";
          } else {
            imageLeft.style.cursor = "default";
          }
        });
    
        imageLeft.addEventListener("mouseout", function () {
          imageLeft.src = "./img/orig_left_stamp.png";
        });
    
        imageLeft.addEventListener("click", function () {
          if (canGoPreviousChapter()) {
            window.location.href = buildChapterUrl(currentChapterNumber - 1);
          } else {
            console.warn("Cannot go previous chapter", {
              currentChapterNumber,
              maxChapterNumber,
              bibleChapterID,
              currentBookId
            });
          }
        });

        let initialTouchX = null;
        let initialTouchY = null;
        
        window.addEventListener("touchstart", function (event) {
          if (event.touches.length === 1) { // single finger
            initialTouchX = event.touches[0].clientX;
            initialTouchY = event.touches[0].clientY;
          }
        }, { passive: true });
        
        window.addEventListener("touchend", function (event) {
          if (initialTouchX === null || initialTouchY === null) return;
        
          const finalTouchX = event.changedTouches[0].clientX;
          const finalTouchY = event.changedTouches[0].clientY;
        
          const diffX = finalTouchX - initialTouchX;
          const diffY = finalTouchY - initialTouchY;
        
          // ignore vertical swipes
          if (Math.abs(diffX) > Math.abs(diffY) && Math.abs(diffX) > 30) { 
            if (diffX > 0) {
              // swipe right → go previous chapter
              if (canGoPreviousChapter()) {
                window.location.href = buildChapterUrl(currentChapterNumber - 1);
              }
            } else {
              // swipe left → go next chapter
              if (canGoNextChapter()) {
                window.location.href = buildChapterUrl(currentChapterNumber + 1);
              }
            }
          }
        
          // reset
          initialTouchX = null;
          initialTouchY = null;
        });   
      }
    
      if (imageRight) {
        imageRight.addEventListener("mouseover", function () {
          if (canGoNextChapter()) {
            imageRight.src = "./img/right_stamp_on.png";
            imageRight.style.cursor = "pointer";
          } else {
            imageRight.style.cursor = "default";
          }
        });
    
        imageRight.addEventListener("mouseout", function () {
          imageRight.src = "./img/orig_right_stamp.png";
        });
    
        imageRight.addEventListener("click", function () {
          if (canGoNextChapter()) {
            window.location.href = buildChapterUrl(currentChapterNumber + 1);
          } else {
            console.warn("Cannot go next chapter", {
              currentChapterNumber,
              maxChapterNumber,
              bibleChapterID,
              currentBookId
            });
          }
        });
      }
    
      initializeChapterArrows();

      // ******************* Mini-editor selection memory *********************
        let savedBibleSelectionOffsets = null;
        
        function getTextOffsetWithinElement(root, targetNode, targetOffset) {
          let offset = 0;
        
          const walker = document.createTreeWalker(
            root,
            NodeFilter.SHOW_TEXT,
            null
          );
        
          while (walker.nextNode()) {
            const node = walker.currentNode;
        
            if (node === targetNode) {
              return offset + targetOffset;
            }
        
            offset += node.nodeValue.length;
          }
        
          return offset;
        }
        
        function getRangeFromTextOffsets(root, startOffset, endOffset) {
          const range = document.createRange();
          let currentOffset = 0;
        
          const walker = document.createTreeWalker(
            root,
            NodeFilter.SHOW_TEXT,
            null
          );
        
          let startSet = false;
          let endSet = false;
        
          while (walker.nextNode()) {
            const node = walker.currentNode;
            const nodeLength = node.nodeValue.length;
            const nodeStart = currentOffset;
            const nodeEnd = currentOffset + nodeLength;
        
            if (!startSet && startOffset >= nodeStart && startOffset <= nodeEnd) {
              range.setStart(node, startOffset - nodeStart);
              startSet = true;
            }
        
            if (!endSet && endOffset >= nodeStart && endOffset <= nodeEnd) {
              range.setEnd(node, endOffset - nodeStart);
              endSet = true;
              break;
            }
        
            currentOffset = nodeEnd;
          }
        
          if (!startSet || !endSet) {
            return null;
          }
        
          return range;
        }
        
        function saveBibleSelection() {
          const selection = window.getSelection();
          const bibleText = document.getElementById("bible-text");
        
          if (!selection || !selection.rangeCount || selection.isCollapsed || !bibleText) {
            return;
          }
        
          const range = selection.getRangeAt(0);
        
          if (!bibleText.contains(range.commonAncestorContainer)) {
            return;
          }
        
          savedBibleSelectionOffsets = {
            start: getTextOffsetWithinElement(bibleText, range.startContainer, range.startOffset),
            end: getTextOffsetWithinElement(bibleText, range.endContainer, range.endOffset)
          };
        }
        
        function restoreBibleSelection() {
          const bibleText = document.getElementById("bible-text");
        
          if (!savedBibleSelectionOffsets || !bibleText) {
            return false;
          }
        
          const range = getRangeFromTextOffsets(
            bibleText,
            savedBibleSelectionOffsets.start,
            savedBibleSelectionOffsets.end
          );
        
          if (!range) {
            return false;
          }
        
          const selection = window.getSelection();
        
          selection.removeAllRanges();
          selection.addRange(range);
        
          return true;
        }
        
        function rememberCurrentSelectionOffsets() {
          saveBibleSelection();
        }
        
        document.addEventListener("selectionchange", saveBibleSelection); 
    
      // ******************* Mini-editor text formatting *********************
      function applyBibleFormat(className) {
          restoreBibleSelection();
        
          const selection = window.getSelection();
        
          if (!selection.rangeCount || selection.isCollapsed) return;
        
          const range = selection.getRangeAt(0);
          const bibleText = document.getElementById("bible-text");
        
          if (!bibleText.contains(range.commonAncestorContainer)) return;
        
          saveBibleSelection();
        
          wrapSelectedTextNodes(range, className);
        
          restoreBibleSelection();
        }
    
      function wrapSelectedTextNodes(range, className) {
        const textNodes = [];
        const bibleText = document.getElementById("bible-text");
    
        const walker = document.createTreeWalker(
          bibleText,
          NodeFilter.SHOW_TEXT,
          {
            acceptNode(node) {
              if (!node.nodeValue.trim()) {
                return NodeFilter.FILTER_REJECT;
              }
    
              if (!range.intersectsNode(node)) {
                return NodeFilter.FILTER_REJECT;
              }
    
              return NodeFilter.FILTER_ACCEPT;
            },
          }
        );
    
        while (walker.nextNode()) {
          textNodes.push(walker.currentNode);
        }
    
        textNodes.forEach((textNode) => {
          wrapTextNodePart(textNode, range, className);
        });
      }
    
      function wrapTextNodePart(textNode, range, className) {
        let startOffset = 0;
        let endOffset = textNode.nodeValue.length;
    
        if (textNode === range.startContainer) {
          startOffset = range.startOffset;
        }
    
        if (textNode === range.endContainer) {
          endOffset = range.endOffset;
        }
    
        if (startOffset >= endOffset) return;
    
        const selectedRange = document.createRange();
        selectedRange.setStart(textNode, startOffset);
        selectedRange.setEnd(textNode, endOffset);
    
        const span = document.createElement("span");
        span.classList.add("bible-user-format", className);
    
        selectedRange.surroundContents(span);
      }
    
      function clearBibleSelectionFormat() {
          restoreBibleSelection();
        
          const selection = window.getSelection();
        
          if (!selection.rangeCount || selection.isCollapsed) return;
        
          const range = selection.getRangeAt(0);
          const bibleText = document.getElementById("bible-text");
        
          if (!bibleText.contains(range.commonAncestorContainer)) return;
        
          saveBibleSelection();
        
          const userFormatSpans = Array.from(
            bibleText.querySelectorAll(".bible-user-format")
          ).filter((span) => {
            return range.intersectsNode(span);
          });
        
          userFormatSpans.forEach((span) => {
            unwrapElement(span);
          });
        
          restoreBibleSelection();
        }
    
      function unwrapElement(element) {
        const parent = element.parentNode;
    
        while (element.firstChild) {
          parent.insertBefore(element.firstChild, element);
        }
    
        parent.removeChild(element);
        parent.normalize();
      }
    
      // ******************* Mini-editor drawing tools *********************
      let activeDrawingTool = null;
      let isDrawing = false;
      let startX = 0;
      let startY = 0;
      let currentShape = null;
      let selectedDrawnAnnotation = null;
      let freehandPoints = [];
    
      let currentFreehandGroup = null;
      let freehandGroupCounter = 0;
    
      const FREEHAND_GROUP_TOUCH_PADDING = 10;
    
      const drawingArea = document.getElementById("bible-drawing-area");
      const annotationLayer = document.getElementById("bible-annotation-layer");
    
      function resizeAnnotationLayer() {
        const bibleText = document.getElementById("bible-text");
        const annotationLayer = document.getElementById("bible-annotation-layer");
    
        if (!bibleText || !annotationLayer) return;
    
        annotationLayer.setAttribute("width", bibleText.scrollWidth);
        annotationLayer.setAttribute("height", bibleText.scrollHeight);
        annotationLayer.style.width = `${bibleText.scrollWidth}px`;
        annotationLayer.style.height = `${bibleText.scrollHeight}px`;
      }
    
      function getExpandedBBox(element, padding = 0) {
        const box = element.getBBox();
    
        return {
          x: box.x - padding,
          y: box.y - padding,
          width: box.width + padding * 2,
          height: box.height + padding * 2,
          right: box.x + box.width + padding,
          bottom: box.y + box.height + padding,
        };
      }
    
      function boxesOverlap(a, b) {
        return !(
          a.right < b.x ||
          a.x > b.right ||
          a.bottom < b.y ||
          a.y > b.bottom
        );
      }
    
      function findTouchingFreehandGroups(path) {
        const pathBox = getExpandedBBox(path, FREEHAND_GROUP_TOUCH_PADDING);
    
        return Array.from(annotationLayer.querySelectorAll(".freehand-group")).filter(
          (group) => {
            if (group.contains(path)) return false;
    
            const groupBox = getExpandedBBox(group, FREEHAND_GROUP_TOUCH_PADDING);
            return boxesOverlap(pathBox, groupBox);
          }
        );
      }
    
      function createFreehandGroup() {
        const newGroup = document.createElementNS(
          "http://www.w3.org/2000/svg",
          "g"
        );
    
        newGroup.classList.add("drawn-annotation", "freehand-group");
        newGroup.dataset.groupId = `freehand-${freehandGroupCounter++}`;
    
        annotationLayer.appendChild(newGroup);
    
        return newGroup;
      }
    
      function mergeFreehandGroups(targetGroup, groupsToMerge) {
        groupsToMerge.forEach((group) => {
          while (group.firstChild) {
            targetGroup.appendChild(group.firstChild);
          }
    
          group.remove();
        });
      }
    
      function attachFreehandPathToGroup(path) {
        const touchingGroups = findTouchingFreehandGroups(path);
    
        if (touchingGroups.length === 0) {
          const group = createFreehandGroup();
          group.appendChild(path);
          currentFreehandGroup = group;
          return;
        }
    
        const targetGroup = touchingGroups[0];
        targetGroup.appendChild(path);
    
        if (touchingGroups.length > 1) {
          mergeFreehandGroups(targetGroup, touchingGroups.slice(1));
        }
    
        currentFreehandGroup = targetGroup;
      }
    
      function finalizeFreehandGroup() {
        currentFreehandGroup = null;
      }
    
      function setDrawingTool(tool) {
        if (activeDrawingTool === "freehand" && tool !== "freehand") {
          finalizeFreehandGroup();
        }
    
        activeDrawingTool = tool;
    
        document.querySelectorAll("[data-drawing-tool]").forEach((button) => {
          button.classList.remove("active-tool");
        });
    
        if (tool) {
          drawingArea.classList.add("drawing-mode");
    
          const activeButton = document.querySelector(`[data-drawing-tool="${tool}"]`);
          if (activeButton) {
            activeButton.classList.add("active-tool");
          }
        } else {
          drawingArea.classList.remove("drawing-mode");
    
          const textButton = document.querySelector('[data-drawing-tool="text"]');
          if (textButton) {
            textButton.classList.add("active-tool");
          }
        }
      }
    
      setDrawingTool(null);
    
      annotationLayer.addEventListener("click", function (event) {
        const clickedAnnotation = event.target.closest(".drawn-annotation");
    
        if (!clickedAnnotation) return;
    
        selectedDrawnAnnotation = clickedAnnotation;
    
        document.querySelectorAll(".drawn-annotation").forEach((shape) => {
          shape.classList.remove("selected-annotation");
        });
    
        selectedDrawnAnnotation.classList.add("selected-annotation");
      });
    
      function clearSelectedDrawnAnnotation() {
        if (selectedDrawnAnnotation) {
          selectedDrawnAnnotation.remove();
          selectedDrawnAnnotation = null;
        }
      }
    
      function clearDrawnAnnotations() {
        annotationLayer.innerHTML = "";
        selectedDrawnAnnotation = null;
        currentFreehandGroup = null;
      }
    
      drawingArea.addEventListener("mousedown", function (event) {
        if (!activeDrawingTool) return;
    
        event.preventDefault();
    
        isDrawing = true;
        selectedDrawnAnnotation = null;
    
        document.querySelectorAll(".drawn-annotation").forEach((shape) => {
          shape.classList.remove("selected-annotation");
        });
    
        const rect = drawingArea.getBoundingClientRect();
    
        startX = (event.clientX - rect.left) / currentBibleZoom;
        startY = (event.clientY - rect.top) / currentBibleZoom;
    
        if (activeDrawingTool === "circle") {
          currentShape = document.createElementNS(
            "http://www.w3.org/2000/svg",
            "ellipse"
          );
    
          currentShape.classList.add("drawn-annotation", "circle");
          annotationLayer.appendChild(currentShape);
        }
    
        if (activeDrawingTool === "square") {
          currentShape = document.createElementNS(
            "http://www.w3.org/2000/svg",
            "rect"
          );
    
          currentShape.classList.add("drawn-annotation", "square");
          annotationLayer.appendChild(currentShape);
        }
    
        if (activeDrawingTool === "freehand") {
          freehandPoints = [`M ${startX} ${startY}`];
    
          currentShape = document.createElementNS(
            "http://www.w3.org/2000/svg",
            "path"
          );
    
          currentShape.classList.add("freehand");
          currentShape.setAttribute("d", freehandPoints.join(" "));
    
          // Temporarily place the path on the SVG layer.
          // When the user releases the mouse, we attach it to the correct group.
          annotationLayer.appendChild(currentShape);
        }
      });
    
      drawingArea.addEventListener("mousemove", function (event) {
        if (!isDrawing || !currentShape) return;
    
        event.preventDefault();
    
        const rect = drawingArea.getBoundingClientRect();
    
        const currentX = (event.clientX - rect.left) / currentBibleZoom;
        const currentY = (event.clientY - rect.top) / currentBibleZoom;
    
        const x = Math.min(startX, currentX);
        const y = Math.min(startY, currentY);
        const width = Math.abs(currentX - startX);
        const height = Math.abs(currentY - startY);
    
        if (activeDrawingTool === "circle") {
          currentShape.setAttribute("cx", x + width / 2);
          currentShape.setAttribute("cy", y + height / 2);
          currentShape.setAttribute("rx", width / 2);
          currentShape.setAttribute("ry", height / 2);
        }
    
        if (activeDrawingTool === "square") {
          currentShape.setAttribute("x", x);
          currentShape.setAttribute("y", y);
          currentShape.setAttribute("width", width);
          currentShape.setAttribute("height", height);
        }
    
        if (activeDrawingTool === "freehand") {
          freehandPoints.push(`L ${currentX} ${currentY}`);
          currentShape.setAttribute("d", freehandPoints.join(" "));
        }
      });
    
      function finishDrawingStroke() {
        if (!isDrawing) return;
    
        if (activeDrawingTool === "freehand" && currentShape) {
          attachFreehandPathToGroup(currentShape);
        }
    
        isDrawing = false;
        currentShape = null;
      }
    
      drawingArea.addEventListener("mouseup", finishDrawingStroke);
      document.addEventListener("mouseup", finishDrawingStroke);
    
      window.addEventListener("resize", function () {
        resizeAnnotationLayer();
        updateBibleZoomLayout();
      });

      const miniToolbar = document.getElementById("bible-mini-toolbar");

      if (miniToolbar) {
          miniToolbar.addEventListener("mousedown", function (event) {
            event.preventDefault();
        });
      }
        
      //********** Dropdown Buttons (highlighter - font color - draw) **********//
      function toggleHighlightMenu() {
        document.getElementById("highlight-menu").classList.toggle("show");
      }
    
      function closeHighlightMenu() {
        document.getElementById("highlight-menu").classList.remove("show");
      }

      function toggleFontMenu() {
        document.getElementById("font-menu").classList.toggle("show");
      }
    
      function closeFontMenu() {
        document.getElementById("font-menu").classList.remove("show");
      }
        
      function toggleFontColorMenu() {
        document.getElementById("font-color-menu").classList.toggle("show");
      }
    
      function closeFontColorMenu() {
        document.getElementById("font-color-menu").classList.remove("show");
      }
        
      function toggleDrawMenu() {
          document.getElementById("draw-menu").classList.toggle("show");
      }
    
      function closeDrawMenu() {
          document.getElementById("draw-menu").classList.remove("show");
      }
        
      document.addEventListener("click", function (event) {
          const fontDropdown = document.querySelector("#font-menu")?.closest(".toolbar-dropdown");
          const highlightDropdown = document.querySelector("#highlight-menu")?.closest(".toolbar-dropdown");
          const fontColorDropdown = document.querySelector("#font-color-menu")?.closest(".toolbar-dropdown");
          const drawDropdown = document.querySelector("#draw-menu")?.closest(".toolbar-dropdown");
        
          if (fontDropdown && !fontDropdown.contains(event.target)) {
            closeFontMenu();
          }
          
          if (highlightDropdown && !highlightDropdown.contains(event.target)) {
            closeHighlightMenu();
          }
        
          if (fontColorDropdown && !fontColorDropdown.contains(event.target)) {
            closeFontColorMenu();
          }
        
          if (drawDropdown && !drawDropdown.contains(event.target)) {
            closeDrawMenu();
          }
      });     
</script>
</body>
</html>
