<!DOCTYPE html>
<html>
<head>
    <link href="css/menu.css" rel="stylesheet" />
    <link href="css/bible-main.css" rel="stylesheet" />
    <link rel="icon" type="image/x-icon" href="/img/favicon.ico">
    <title>Branch of Israel - Bible App</title>
</head>

<body class="index">
    <div class="subheader" id="stickyHeader">
        <div class="container flex">
            <div class="subheadings">
                <div class="column">
                  <div class="hamburger">
                      <button
                      type="button"
                      id="menuToggle"
                      class="main-nav-toggle"
                      aria-label="Toggle menu"
                      aria-expanded="false"
                    >
                      <span></span>
                      <span></span>
                      <span></span>
                    </button>
                  </div>
                </div>
                
                <div class="column">
                    <span class="tooltip">
                        <span id="bibleabbr"></span>
                        <span class="tooltiptext tooltip-bottom">
                            <span id="biblefullname"></span>
                        </span>
                    </span>
                </div>
                
                <div class="column">
                    <span style="color:lightgray;">Book & Chapter</span>
                </div>
            </div>
        </div>
    </div>

    <header>
        <div id="menuNav" class="overlay">
            <div class="overlay-content">
                <a href="./index.html">Home</a>
                <a href="#" class="current">Books</a>
                <a id="sticky" href="#" class="disabled">Chapter</a>
                <a href="./search.html">Search</a>
                <!--<a href="#">Preferences</a>-->
            </div>
        </div>
    </header>

    <main class="container">
        <span id="book-list" class="list-container numeric-list tooltip-container"></span>
        
        <div class="leftcol">
            <a id="prevURL">
                <img id="imgleft" class="left-button" src="./img/orig_left_stamp.png" />
            </a>
        </div>

        <div class="rightcol">
            <a id="nextURL">
                <img id="imgright" class="right-button" src="./img/orig_right_stamp.png" />
            </a>
        </div>
    </main>

    <script src="js/my_key.js"></script>
    <script src="js/menu.js" defer></script>
   <script>
      const bibleBookList = document.querySelector(`#book-list`);
      const bibleVersionID = getParameterByName("bible") || getParameterByName("version");
      const fullbiblename =  getParameterByName("bibleName") || getParameterByName("name");    
      const abbreviation = getParameterByName("bibleAbbr") || getParameterByName("abbr");

      let bookHTML = ``;

      if (!bibleVersionID) {
        window.location.href = `./index.html`;
      }

      getBooks(bibleVersionID).then((bookList) => {
        bookHTML += `<ol>`;
        for (let book of bookList) {
          const chapterParams = new URLSearchParams({
              bible: bibleVersionID,
              bibleAbbr: abbreviation || "",
              bibleName: fullbiblename || "",
              book: book.id,
              bookName: book.name
            });
            
            bookHTML += `
              <li class="grid">
                <a
                  href="./chapter.html?${chapterParams.toString()}"
                  title="${book.name}"
                >
                  ${book.id}
                </a>
              </li>
            `;
          }
          
        bookHTML += `</ol>`;
       
        bibleBookList.innerHTML = bookHTML;

      });

      //************ subheader content ***********
      document.getElementById("biblefullname").textContent = fullbiblename || "";
      document.getElementById("bibleabbr").textContent = abbreviation || "";
         
      //************ subheader content ***********
      function getBooks(bibleVersionID) {
        return new Promise((resolve, reject) => {
          const xhr = new XMLHttpRequest();
          xhr.withCredentials = false;

          xhr.addEventListener(`readystatechange`, function () {
            if (this.readyState === this.DONE) {
              const { data } = JSON.parse(this.responseText);
              const books = data.map(({ name, id }) => {
                return { name, id };
              });

              resolve(books);
            }
          });

          xhr.open(
            `GET`,
            `https://api.scripture.api.bible/v1/bibles/${bibleVersionID}/books`
          );

          xhr.setRequestHeader(`api-key`, API_KEY);

          xhr.onerror = () => reject(xhr.statusText);

          xhr.send();
        });
      }

      function getParameterByName(name) {
        const url = window.location.href;
        name = name.replace(/[\[\]]/g, `\\$&`);
        const regex = new RegExp(`[?&]` + name + `(=([^&#]*)|&|#|$)`),
          results = regex.exec(url);
        if (!results) return null;
        if (!results[2]) return ``;
        return decodeURIComponent(results[2].replace(/\+/g, ` `));
      }

    // ************* Side Menu **************
    function openNav() {
      document.getElementById("menuNav").style.width = "225px";
    }

    function closeNav() {
      document.getElementById("menuNav").style.width = "0px";
    }  
    </script>
</body>
</html>
