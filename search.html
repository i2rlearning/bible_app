<!doctype html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta content="IE=edge,chrome=1" http-equiv="X-UA-Compatible">

    <link href="css/menu.css" rel="stylesheet">
    <link href="css/menu-scroll.css" rel="stylesheet">
    <link href="css/menu-popover.css" rel="stylesheet">
    <link href="css/bible-main.css" rel="stylesheet">
    <link href="css/scripture.css" rel="stylesheet">
    <link href="css/search.css" rel="stylesheet">
    <link rel="icon" type="image/x-icon" href="/img/favicon.ico">

    <title>Branch of Israel - Scripture Search</title>
  </head>

  <body class="basic basic_search">
    <div class="subheader" id="stickyHeader">
      <div class="search-topbar">
        <div class="hamburger">
          <button
            type="button"
            id="menuToggle"
            class="main-nav-toggle"
            aria-label="Toggle menu"
            aria-expanded="false"
          >
            <span></span>
            <span></span>
            <span></span>
          </button>
        </div>

        <div class="search-topbar-spacer" aria-hidden="true"></div>
      </div>
    </div>

    <header>
      <div id="menuNav" class="overlay">
        <div class="overlay-content">
          <a href="./index.html">Home</a>
          <a href="https://bible.branchofisrael.com/search.html?bible=bba9f40183526463-01&bibleAbbr=BSB&bibleName=Berean+Standard+Bible&book=HEB&bookName=Hebrews&chapter=HEB.1#">Open Passage</a>
          <a href="#" class="current">Search</a>
          <a href="https://bible.branchofisrael.com/verse.html?bible=bba9f40183526463-01&bibleAbbr=BSB&bibleName=Berean+Standard+Bible&book=HEB&bookName=Hebrews&chapter=HEB.1#">Preferences</a>
        </div>
      </div>
    </header>

    <main class="search-page">
      <section class="search-card" aria-labelledby="search-title">
        <p class="search-eyebrow">Scripture Search</p>
        <h1 id="search-title">Find a verse or passage</h1>

        <div class="search-bible-strip">
          <span class="search-bible-label">Searching in</span>
          <strong class="search-current-bible" id="search-current-bible">
            Loading Bible...
          </strong>
        </div>

        <form id="scripture-search-form" class="scripture-search-form">
          <label class="search-input-label" for="search-input">
            Search words or reference
          </label>

          <div class="scripture-search-row">
            <input
              type="search"
              id="search-input"
              autocomplete="off"
              placeholder='Example: "kingdom of heaven", east, or John 3:16'
            >

            <button type="submit" class="scripture-search-button">
              Search
            </button>

            <button type="button" id="clear-search" class="search-clear-button">
              Clear
            </button>
          </div>

          <div class="search-options">
            <label class="search-option">
              <input type="checkbox" id="exact-word-only">
              <span>Exact word only</span>
            </label>
          </div>
        </form>

        <p class="search-help">
          Smart search shows exact matches first and then close word forms. Use quotes for an exact phrase.
        </p>
      </section>

      <section class="search-results-panel" aria-live="polite">
        <div class="search-results-header">
          <div>
            <h2 id="search-results-title">Results</h2>
            <p id="search-results-summary">Enter a word, phrase, or reference to begin.</p>
          </div>
        </div>

        <div id="search-status" class="search-status"></div>
        <div id="results-list" class="search-results-list"></div>

        <div class="search-pagination" id="search-pagination"></div>
      </section>
    </main>

    <script src="js/my_key.js"></script>
    <script src="https://cdn.scripture.api.bible/fums/fumsv2.min.js"></script>
    <script src="js/user-preferences.js"></script>
    <script src="js/menu.js" defer></script>
    <script src="js/search.js" defer></script>
  </body>
</html>
